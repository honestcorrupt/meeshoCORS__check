<!DOCTYPE html>
<html>
<head><title>Meesho CORS Debug</title></head>
<body>
<h2>Meesho CORS Test - Check Console + Network Tab</h2>
<button onclick="testCORS()">Run Test</button>

<script>
async function testCORS() {
  const url = "https://www.meesho.com/zMrsM4/K1zIxg/4/c3d/L0g4NSwh/Oauuppi50brE0JEGiw/ATJQAQ/ZD/JXERNKOUsB";

  console.clear();
  console.log("🔍 Testing from:", window.location.origin);

  // 1. Test OPTIONS preflight
  try {
    console.log("→ Sending OPTIONS preflight...");
    const pre = await fetch(url, {
      method: "OPTIONS",
      headers: {
        "Origin": window.location.origin,
        "Access-Control-Request-Method": "POST",
        "Access-Control-Request-Headers": "Content-Type"
      }
    });
    console.log("Preflight Status:", pre.status);
    console.log("Preflight ACAO:", pre.headers.get("access-control-allow-origin"));
    console.log("Preflight ACAC:", pre.headers.get("access-control-allow-credentials"));
  } catch(e) { console.error("Preflight failed:", e); }

  // 2. Try actual POST
  try {
    console.log("→ Sending POST...");
    const res = await fetch(url, {
      method: "POST",
      credentials: "include",
      headers: { "Content-Type": "text/plain;charset=UTF-8" },
      body: "test"
    });

    console.log("POST Status:", res.status);
    console.log("Response ACAO:", res.headers.get("access-control-allow-origin"));
    const data = await res.text();
    console.log("Response Body:", data);
  } catch(e) {
    console.error("POST failed:", e.message);
  }
}
</script>
</body>
</html>
