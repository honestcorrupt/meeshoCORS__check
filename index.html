<!DOCTYPE html>
<html>
<head><title>Meesho CORS Test</title></head>
<body>
<h2>Meesho CORS Test - /orders</h2>
<button onclick="testEndpoint()">Test /orders</button>

<script>
async function testEndpoint() {
  const url = "https://www.meesho.com/orders";
  
  console.clear();
  console.log("Testing:", url);

  try {
    const res = await fetch(url, {
      method: "GET",
      credentials: "include",
      headers: {
        "Accept": "application/json, text/html"
      }
    });

    console.log("Status:", res.status);
    console.log("Content-Type:", res.headers.get("content-type"));
    console.log("ACAO:", res.headers.get("access-control-allow-origin"));
    console.log("ACAC:", res.headers.get("access-control-allow-credentials"));

    const text = await res.text();
    console.log("Response length:", text.length);
    console.log("Preview:", text.substring(0, 600));
  } catch(e) {
    console.error("Failed:", e.message);
  }
}
</script>
</body>
</html>
