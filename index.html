<!DOCTYPE html>
<html>
<head><title>Meesho CORS Debug</title></head>
<body>
<h2>Meesho CORS Test - Check Console (F12)</h2>

<script>
async function testCORS() {
  const targetUrl = "https://www.meesho.com/zMrsM4/K1zIxg/4/c3d/L0g4NSwh/Oauuppi50brE0JEGiw/ATJQAQ/ZD/JXERNKOUsB";

  console.log("Starting test from origin:", window.location.origin);

  try {
    // First do manual preflight simulation
    console.log("Sending OPTIONS preflight...");
    
    const preflight = await fetch(targetUrl, {
      method: "OPTIONS",
      headers: {
        "Origin": window.location.origin,
        "Access-Control-Request-Method": "POST",
        "Access-Control-Request-Headers": "Content-Type"
      }
    });

    console.log("Preflight Status:", preflight.status);
    console.log("Preflight Headers:", Object.fromEntries(preflight.headers));

    // Now try the actual POST
    const res = await fetch(targetUrl, {
      method: "POST",
      credentials: "include",
      headers: {
        "Content-Type": "text/plain;charset=UTF-8",
        "Origin": window.location.origin
      },
      body: JSON.stringify({ test: "data", timestamp: Date.now() })
    });

    console.log("POST Status:", res.status);
    console.log("Response Headers:", Object.fromEntries(res.headers));

    const data = await res.text();
    console.log("Response Body:", data);

    if (data.length > 5) {
      alert("✅ Got real data! Check console.");
    }

  } catch (e) {
    console.error("❌ Error:", e);
    alert("Blocked - Check console for details");
  }
}

testCORS();
</script>
</body>
</html>
